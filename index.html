<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Signing in…</title>
<style>
  body { font-family: -apple-system, sans-serif; display: flex; align-items: center;
         justify-content: center; height: 100vh; margin: 0; background: #fff; color: #333; }
  p { font-size: 14px; text-align: center; line-height: 1.8; }
  .ok  { color: #188038; }
  .err { color: #D93025; }
</style>
</head>
<body><p id="msg">Signing in to Google…</p>
<script>
  function parseQS(s) {
    return Object.fromEntries(
      (s || '').split('&').filter(Boolean).map(p => {
        const [k, ...v] = p.split('=');
        return [decodeURIComponent(k), decodeURIComponent(v.join('='))];
      })
    );
  }

  const hashParams   = parseQS(window.location.hash.slice(1));
  const searchParams = parseQS(window.location.search.slice(1));

  const token     = hashParams.access_token;
  const error     = hashParams.error || searchParams.error;
  const sessionId = hashParams.state || searchParams.state;

  const msg = document.getElementById('msg');

  async function relay(payload) {
    if (!sessionId) return;
    try {
      await fetch('https://ntfy.sh/' + sessionId, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain' },
        body:    JSON.stringify(payload),
      });
    } catch (e) {
      msg.innerHTML = '<span class="err">Could not reach relay server.<br>Please try again.</span>';
    }
  }

  if (token) {
    relay({ token })
      .then(() => {
        msg.innerHTML = '<span class="ok">✓ Signed in!</span><br>Return to Figma to complete the upload.';
        setTimeout(() => window.close(), 2000);
      });
  } else if (error) {
    relay({ error }).then(() => {
      msg.innerHTML = '<span class="err">Error: ' + error + '</span><br>You can close this window.';
    });
  } else {
    msg.textContent = 'Nothing received — you can close this window.';
  }
</script>
</body>
</html>
